let state;

function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    if (s) {
      const p = JSON.parse(s);
      state = { ...defaultState(), ...p };
      state.chat.typing = false;   // never persist transient flags
    } else {
      state = defaultState();
    }
  } catch (e) {
    console.warn('State load failed:', e);
    state = defaultState();
  }
}

function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch (e) { /* ignore */ }
}

function resetState() {
  localStorage.removeItem(LS_KEY);
  state = defaultState();
  render();
}

function Button({ variant='primary', size='md', children, action, arg, className='', type='button', disabled=false }) {
  const sizes = { sm:'h-8 px-3 text-xs', md:'h-10 px-4 text-sm', lg:'h-12 px-6 text-base' };
  const variants = {
    primary:  'bg-brand-600 hover:bg-brand-500 text-white shadow-lg shadow-brand-900/40',
    ghost:    'bg-transparent hover:bg-ink-800 text-ink-100',
    outline:  'border border-ink-700 hover:border-ink-500 hover:bg-ink-800/50 text-ink-100',
    danger:   'bg-rose-600 hover:bg-rose-500 text-white',
    success:  'bg-emerald-600 hover:bg-emerald-500 text-white',
    soft:     'bg-brand-600/10 hover:bg-brand-600/20 text-brand-300 border border-brand-600/30',
  };
  const attrs = [
    action ? `data-action="${esc(action)}"` : '',
    arg    ? `data-arg="${esc(arg)}"`       : '',
    disabled ? 'disabled' : '',
    `type="${type}"`
  ].filter(Boolean).join(' ');
  return `<button ${attrs} class="inline-flex items-center gap-2 rounded-lg font-medium transition-all active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed ${sizes[size]} ${variants[variant]} ${className}">${children}</button>`;
}

function Badge({ color='gray', children, className='' }) {
  const colors = {
    gray:   'bg-ink-800 text-ink-300 border-ink-700',
    violet: 'bg-brand-600/10 text-brand-300 border-brand-600/30',
    green:  'bg-emerald-500/10 text-emerald-400 border-emerald-500/30',
    yellow: 'bg-amber-500/10 text-amber-400 border-amber-500/30',
    red:    'bg-rose-500/10 text-rose-400 border-rose-500/30',
    blue:   'bg-sky-500/10 text-sky-400 border-sky-500/30',
  };
  return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium border ${colors[color]} ${className}">${children}</span>`;
}

function Card({ children, className='', hover=false }) {
  return `<div class="rounded-xl border border-ink-800 bg-ink-900/50 backdrop-blur ${hover?'hover:border-ink-700 hover:bg-ink-900/80 transition':''} ${className}">${children}</div>`;
}

function ProgressBar({ value, max=100, color='violet' }) {
  const pct = Math.min(100, Math.round((value / max) * 100));
  const colors = { violet:'bg-brand-500', green:'bg-emerald-500', yellow:'bg-amber-500', red:'bg-rose-500' };
  return `<div class="h-1.5 w-full rounded-full bg-ink-800 overflow-hidden"><div class="h-full rounded-full transition-all ${colors[color]}" style="width:${pct}%"></div></div>`;
}

function ProviderLogo({ providerId, size=28 }) {
  const p = providerById(providerId);
  return `<div class="rounded-md flex items-center justify-center text-white font-bold text-[10px] tracking-wider shadow" style="width:${size}px;height:${size}px;background:${p.color}">${esc(p.abbr)}</div>`;
}

function Modal({ children, size='md' }) {
  const sizes = { sm:'max-w-md', md:'max-w-xl', lg:'max-w-3xl', xl:'max-w-5xl' };
  return `<div class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">

}

// ═══════════════════════════════════════════════════════════════════════════
//  Scripted AI — pattern-matcher that produces messages + tool calls + diffs
// ═══════════════════════════════════════════════════════════════════════════
function scriptedAIResponse(text) {
  const t = text.toLowerCase().trim();
  const nid = () => 'm' + (++state.chat.nextId);
  const aid = () => 'a' + (++state.chat.nextId);

  // "статус" pattern → создать новый статус в воронке
  if (/статус|этап/i.test(t) && !/удали|переименуй/i.test(t)) {
    const match = t.match(/["«"']([^"»"']+)["»"']/);
    const statusName = match ? match[1] : 'Новый статус';
    return [
      { id:nid(), role:'assistant', content:`Хорошо, добавлю статус «${statusName}» в воронку «Продажи». Ниже — план изменений, применится только после Apply.`,
        tools:[{ name:'crm.list_statuses', args:'pipeline=Продажи', result:'5 статусов: Первичный контакт → Переговоры → Договор → Закрыто (успех/отказ)', ok:true }]
      },
      { id:nid(), role:'assistant', content:'Готов diff:', actions:[
        { id:aid(), tool:'crm.plan_create_status', title:`Создать статус "${statusName}"`,
          diff:{ before:null, after:{ pipelineId:'sales', name:statusName, color:'#7C3AED', position:4 } } }
      ]}
    ];
  }

  // "поле" pattern → создать поле
  if (/поле/i.test(t)) {
    const match = t.match(/["«"']([^"»"']+)["»"']/);
    const fieldName = match ? match[1] : 'Новое поле';
    const isContact = /контакт/i.test(t);
    const isSelect = /список|варианты|выбор/i.test(t);
    return [
      { id:nid(), role:'assistant', content:`Добавлю поле «${fieldName}» в ${isContact?'контакты':'сделки'}. ${isSelect?'Будет типа select.':'По умолчанию — текст.'}`,
        tools:[{ name:'crm.list_fields', args:`entity=${isContact?'contact':'lead'}`, result:isContact?'14 полей':'22 поля', ok:true }]
      },
      { id:nid(), role:'assistant', content:'Готов diff:', actions:[
        { id:aid(), tool:'crm.plan_create_field', title:`Поле "${fieldName}" (${isContact?'контакты':'сделки'})`,
          diff:{ before:null, after:{ entity:isContact?'contact':'lead', name:fieldName, type:isSelect?'select':'text', required:false } } }
      ]}
    ];
  }

  // "воронка" / "фитнес" / "барбершоп" / "фотостуди" / etc → создать воронку под нишу
  if (/воронк|фитнес|барбер|фотостуди|салон|стоматолог|курс/i.test(t)) {
    let niche = 'услуг', statuses = ['Заявка','В работе','Договорились','Оказана','Закрыто'];
    if (/фитнес/i.test(t))    { niche = 'фитнес-клуба'; statuses = ['Пробное занятие','Первичная консультация','Оформление','Активный','Отписался']; }
    if (/барбер/i.test(t))    { niche = 'барбершопа';   statuses = ['Заявка','Подтверждение','Пришёл','Услуга оказана','Пропустил']; }
    if (/фотостуди/i.test(t)) { niche = 'фотостудии';   statuses = ['Заявка','Подбор даты','Бронь','Съёмка','Постпродакшен','Закрыто']; }
    if (/стоматолог/i.test(t)){ niche = 'стоматологии'; statuses = ['Первичная','Диагностика','План лечения','Лечение','На поддержке']; }
    if (/курс/i.test(t))      { niche = 'онлайн-курсов'; statuses = ['Лид','Согласовано','Оплата','Прошёл модуль 1','Завершил','Отвалился']; }
    return [
      { id:nid(), role:'assistant', content:`Понял, готовлю воронку под ${niche}. Сначала посмотрю что уже есть.`,
        tools:[{ name:'crm.list_pipelines', result:'3 существующие: Продажи, Сервис, Партнёры', ok:true }]
      },
      { id:nid(), role:'assistant', content:`Предлагаю создать воронку с ${statuses.length} статусами:\n${statuses.map(s=>'• '+s).join('\n')}\n\nПоказать diff?` },
      { id:nid(), role:'assistant', content:'Готов diff:', actions:[
        { id:aid(), tool:'crm.plan_create_pipeline', title:`Создать воронку для ${niche}`,
          diff:{ before:null, after:{ name:'Заказы', statuses: statuses.map((s,i) => ({ name:s, color:['#94A3B8','#7C3AED','#0EA5E9','#F59E0B','#10B981','#22C55E'][i%6] })) } } }
      ]}
    ];
  }

  // "задач", "напоминани" → создать задачу
  if (/задач|напоминани|уведомлени/i.test(t)) {
    return [
      { id:nid(), role:'assistant', content:'Настрою напоминание менеджеру. Триггер сработает автоматически.', actions:[
        { id:aid(), tool:'automation.plan_create_trigger', title:'Задача при статусе "Бронь"',
          diff:{ before:null, after:{ event:'lead.status_changed', condition:{ statusName:'Бронь' }, action:{ type:'create_task', title:'Позвонить клиенту за 24ч', assignee:'responsible', dueOffset:'-P1D' } } } }
      ]}
    ];
  }

  // "статистик" / "покажи" — read-only
  if (/статист|покаж|отчёт/i.test(t)) {
    return [
      { id:nid(), role:'assistant', content:'За последние 30 дней:\n• Новых сделок: 46\n• Выигранных: 12 (26%)\n• Закрытых с отказом: 8\n• В работе: 26\n• Средний чек: 8 400 ₽\n• Средний цикл сделки: 6.2 дня',
        tools:[
          { name:'crm.list_leads', args:'period=30d', result:'46 сделок', ok:true },
          { name:'crm.aggregate', args:'group_by=status', result:'12 won / 8 lost / 26 in progress', ok:true },
        ]}
    ];
  }

  // "тег"
  if (/тег/i.test(t)) {
    const m = t.match(/["«"']([^"»"']+)["»"']/);
    const tag = m ? m[1] : 'VIP';
    return [
      { id:nid(), role:'assistant', content:`Добавлю тег «${tag}». В amoCRM теги задаются на уровне контактов и сделок.`, actions:[
        { id:aid(), tool:'crm.plan_create_tag', title:`Создать тег "${tag}"`, diff:{ before:null, after:{ name:tag, color:'#7C3AED', entity:'contact' } } }
      ]}
    ];
  }

  // Fallback — general answer
  return [
    { id:nid(), role:'assistant', content:'Понял запрос. В боевой версии я тут вызову свои инструменты (посмотреть структуру CRM, предложить план, показать diff). В этом демо я работаю в scripted-режиме — попробуй одну из подсказок под полем ввода или запросы вроде:\n\n• "Добавь статус «Согласование» в воронку"\n• "Создай поле «Размер обуви» в контактах"\n• "Настрой воронку под фитнес-клуб"\n• "Покажи статистику за месяц"' }
  ];
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════
const screens = {
  dashboard:    renderDashboard,
  chat:         renderChat,
  integrations: renderIntegrations,
  templates:    renderTemplates,
  builder:      renderBuilder,
  deployments:  renderDeployments,
  marketplace:  renderMarketplace,
  billing:      renderBilling,
  audit:        renderAudit,
  settings:     renderSettings,
};

function render() {
  const app = document.getElementById('app');
  if (state.view === 'landing') {
    app.innerHTML = renderLanding();
  } else {
    const screen = screens[state.view] || renderDashboard;
    app.innerHTML = `<div class="flex h-screen">${Sidebar()}<main class="flex-1 flex flex-col overflow-hidden">${TopBar()}<div class="flex-1 overflow-auto">${screen()}</div></main></div>`;
  }
  // Post-render: scroll chat to bottom, focus inputs where needed
  const chatScroll = document.getElementById('chat-scroll');
  if (chatScroll) chatScroll.scrollTop = chatScroll.scrollHeight;
  saveState();
}

// ═══════════════════════════════════════════════════════════════════════════
//  ACTIONS  (dispatched via data-action attributes)
// ═══════════════════════════════════════════════════════════════════════════
const actions = {
  go: (view) => { state.view = view; render(); },

  // Landing / modals
  openIntegrationsModal:  () => { state.integrations.modalOpen = true;  render(); },
  closeIntegrationsModal: () => { state.integrations.modalOpen = false; render(); },
  closeAllModals: () => {
    state.integrations.modalOpen = false;
    state.marketplace.installing = null;
    render();
  },

  // Chat mutations
  applyMutation:  (id) => {
    state.chat.applied[id] = 'applied';
    state.audit.log.unshift({ id:'a'+Date.now(), who:'Григорий', action:'apply', target:`Мутация ${id} применена в CRM`, when:'только что', kind:'mutation' });
    render();
  },
  rejectMutation: (id) => { state.chat.applied[id] = 'rejected'; render(); },

  // Chat input
  setChatInputAndFocus: (text) => {
    const ta = document.getElementById('chat-input');
    if (ta) { ta.value = text; ta.focus(); }
  },
  sendChatMessage: () => {
    const ta = document.getElementById('chat-input');
    if (!ta) return;
    const text = ta.value.trim();
    if (!text) return;
    const userMsg = { id: 'm'+(++state.chat.nextId), role:'user', content: text };
    state.chat.messages.push(userMsg);
    state.chat.typing = true;
    ta.value = '';
    render();
    setTimeout(() => {
      state.chat.typing = false;
      const responses = scriptedAIResponse(text);
      state.chat.messages.push(...responses);
      render();
    }, 900);
  },

  newChatSession: () => {
    state.chat.messages = [];
    state.chat.applied = {};
    state.chat.messages.push({
      id:'m'+(++state.chat.nextId), role:'assistant',
      content:'Готов помочь. Что настроим? Могу изменить структуру CRM, собрать шаблон сайта или бота, подключить интеграцию. Опиши задачу — покажу план и diff перед применением.'
    });
    state.view = 'chat';
    render();
  },

  // Integrations
  addIntegration: (providerId) => {
    const p = providerById(providerId);
    if (!p) return;
    state.integrations.list.push({
      id: 'i'+Date.now(), provider: providerId,
      name: `${p.name} (только что)`, subdomain: 'demo.example.com',
      status: 'connected', lastSync: 'только что', pipelines: 0, fields: 0,
    });
    state.integrations.modalOpen = false;
    state.audit.log.unshift({ id:'a'+Date.now(), who:'Григорий', action:'oauth', target:`Подключён ${p.name}`, when:'только что', kind:'auth' });
    render();
  },
  refreshIntegration: (id) => {
    const it = state.integrations.list.find(x => x.id === id);
    if (it) { it.status = 'connected'; it.lastSync = 'только что'; }
    render();
  },

  // Templates
  setTemplateFilter: (id) => { state.templates.filter = id; render(); },

  // Builder
  builderSetColor: (color) => { state.builder.config.brand.primaryColor = color; render(); },
  builderPreset: (text) => {
    state.builder.busy = true;
    render();
    setTimeout(() => {
      const c = state.builder.config;
      if (text.includes('зелёный')) c.brand.primaryColor = '#10B981';
      if (text.includes('Питере'))  c.hero.title = 'Фотостудия в Питере';
      if (text.includes('Предмет')) c.services = [...c.services, 'Предметная'];
      state.builder.busy = false;
      render();
    }, 700);
  },

  // Marketplace
  openRecipeInstall: (id) => { state.marketplace.installing = recipes.find(r => r.id === id); state.marketplace.step = 1; render(); },
  closeRecipeInstall: () => { state.marketplace.installing = null; render(); },
  nextRecipeStep: () => { state.marketplace.step++; render(); },
  prevRecipeStep: () => { state.marketplace.step--; render(); },
  finishRecipeInstall: () => {
    const inst = state.marketplace.installing;
    if (inst && !state.marketplace.installed.includes(inst.id)) {
      state.marketplace.installed.push(inst.id);
      state.audit.log.unshift({ id:'a'+Date.now(), who:'Григорий', action:'install_recipe', target:`Установлен «${inst.name}»`, when:'только что', kind:'recipe' });
    }
    state.marketplace.installing = null;
    render();
  },

  // Audit
  setAuditTab: (id) => { state.audit.tab = id; render(); },

  // Meta
  resetDemo: () => {
    if (confirm('Сбросить все данные демо? Все применённые мутации, установленные рецепты и настройки будут стёрты.')) {
      resetState();
    }
  },
};

// ═══════════════════════════════════════════════════════════════════════════
//  EVENT DELEGATION
// ═══════════════════════════════════════════════════════════════════════════
document.body.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const arg = target.dataset.arg;
  if (actions[action]) {
    e.preventDefault();
    actions[action](arg, e);
  }
});

// Form submit for chat
document.body.addEventListener('submit', (e) => {
  const form = e.target.closest('[data-action="sendChatMessageForm"]');
  if (form) { e.preventDefault(); actions.sendChatMessage(); }
});

// Enter-to-send on chat textarea
document.body.addEventListener('keydown', (e) => {
  if (e.target && e.target.id === 'chat-input' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    actions.sendChatMessage();
  }
});

// Input bindings — update state WITHOUT full re-render (preserves focus/caret)
document.body.addEventListener('input', (e) => {
  const el = e.target.closest('[data-bind]');
  if (!el) return;
  const path = el.dataset.bind;
  const parts = path.split('.');
  let cur = state;
  for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
  cur[parts[parts.length - 1]] = el.value;
  saveState();
  // For builder — refresh preview only
  const preview = document.getElementById('preview-panel');
  if (preview && path.startsWith('builder.config.')) {
    preview.innerHTML = renderPreviewCard();
  }
});

// ═══════════════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════════════
loadState();
render();
</script>

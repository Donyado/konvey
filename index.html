let state;

// Recursive shallow-per-key merge: keeps saved fields where present,
// backfills any newly-added default fields, ignores nulls/arrays as objects.
function deepMerge(base, patch) {
  if (patch === null || typeof patch !== 'object' || Array.isArray(patch)) return patch;
  const out = { ...base };
  for (const key of Object.keys(patch)) {
    const b = base ? base[key] : undefined;
    const p = patch[key];
    if (b && typeof b === 'object' && !Array.isArray(b) && p && typeof p === 'object' && !Array.isArray(p)) {
      out[key] = deepMerge(b, p);
    } else {
      out[key] = p;
    }
  }
  return out;
}

function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    if (s) {
      const p = JSON.parse(s);
      state = deepMerge(defaultState(), p);
      state.chat.typing = false;   // never persist transient flags
      state.botSim = null;         // never resume modals from LS
    } else {
      state = defaultState();
    }
  } catch (e) {
    console.warn('State load failed:', e);
    state = defaultState();
  }
}

function saveState() {
  try {
    // Do NOT persist transient/bulky things
    const { botSim, ...persisted } = state;
    if (persisted.chat) persisted.chat = { ...persisted.chat, typing: false };
    localStorage.setItem(LS_KEY, JSON.stringify(persisted));
  } catch (e) { /* ignore quota errors — images can be big */ }
}

function resetState() {
  localStorage.removeItem(LS_KEY);
  state = defaultState();
  render();
}

//  IMAGE COMPRESSION  (client-side, canvas-based — same algo as apps/web)
// ═══════════════════════════════════════════════════════════════════════════
async function compressImage(file, { maxDim = 1400, quality = 0.82 } = {}) {
  if (!file || !file.type.startsWith('image/')) throw new Error('Не изображение');
  if (file.size > 25 * 1024 * 1024) throw new Error('Файл больше 25 MB');
  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Не удалось прочитать файл'));
    r.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error('Файл не является корректным изображением'));
    i.src = dataUrl;
  });
  let { width, height } = img;
  if (width > maxDim || height > maxDim) {
    const scale = maxDim / Math.max(width, height);
    width = Math.round(width * scale);
    height = Math.round(height * scale);
  }
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, 0, 0, width, height);
  return canvas.toDataURL('image/jpeg', quality);
}

// Get/Set nested path helpers
function getPath(obj, path) {
  return path.split('.').reduce((cur, key) => {
    if (cur == null) return undefined;
    const m = key.match(/^(\w+)\[(\d+)\]$/);
    if (m) return cur[m[1]]?.[+m[2]];
    return cur[key];
  }, obj);
}
function setPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const p = parts[i];
    const m = p.match(/^(\w+)\[(\d+)\]$/);
    cur = m ? cur[m[1]][+m[2]] : cur[p];
  }
  const last = parts[parts.length - 1];
  const m = last.match(/^(\w+)\[(\d+)\]$/);
  if (m) cur[m[1]][+m[2]] = value; else cur[last] = value;
}

// ═══════════════════════════════════════════════════════════════════════════
//  Scripted AI — pattern-matcher that produces messages + tool calls + diffs
// ═══════════════════════════════════════════════════════════════════════════
function scriptedAIResponse(text) {
  const t = text.toLowerCase().trim();
  const nid = () => 'm' + (++state.chat.nextId);
  const aid = () => 'a' + (++state.chat.nextId);

  // "статус" pattern → создать новый статус в воронке
  if (/статус|этап/i.test(t) && !/удали|переименуй/i.test(t)) {
    const match = t.match(/["«"']([^"»"']+)["»"']/);
    const statusName = match ? match[1] : 'Новый статус';
    return [
      { id:nid(), role:'assistant', content:`Хорошо, добавлю статус «${statusName}» в воронку «Продажи». Ниже — план изменений, применится только после Apply.`,
        tools:[{ name:'crm.list_statuses', args:'pipeline=Продажи', result:'5 статусов: Первичный контакт → Переговоры → Договор → Закрыто (успех/отказ)', ok:true }]
      },
      { id:nid(), role:'assistant', content:'Готов diff:', actions:[
        { id:aid(), tool:'crm.plan_create_status', title:`Создать статус "${statusName}"`,
          diff:{ before:null, after:{ pipelineId:'sales', name:statusName, color:'#7C3AED', position:4 } } }
      ]}
    ];
  }

  // "поле" pattern → создать поле
  if (/поле/i.test(t)) {
    const match = t.match(/["«"']([^"»"']+)["»"']/);
    const fieldName = match ? match[1] : 'Новое поле';
    const isContact = /контакт/i.test(t);
    const isSelect = /список|варианты|выбор/i.test(t);
    return [
      { id:nid(), role:'assistant', content:`Добавлю поле «${fieldName}» в ${isContact?'контакты':'сделки'}. ${isSelect?'Будет типа select.':'По умолчанию — текст.'}`,
        tools:[{ name:'crm.list_fields', args:`entity=${isContact?'contact':'lead'}`, result:isContact?'14 полей':'22 поля', ok:true }]
      },
      { id:nid(), role:'assistant', content:'Готов diff:', actions:[
        { id:aid(), tool:'crm.plan_create_field', title:`Поле "${fieldName}" (${isContact?'контакты':'сделки'})`,
          diff:{ before:null, after:{ entity:isContact?'contact':'lead', name:fieldName, type:isSelect?'select':'text', required:false } } }
      ]}
    ];
  }

  // "воронка" / "фитнес" / "барбершоп" / "фотостуди" / etc → создать воронку под нишу
  if (/воронк|фитнес|барбер|фотостуди|салон|стоматолог|курс/i.test(t)) {
    let niche = 'услуг', statuses = ['Заявка','В работе','Договорились','Оказана','Закрыто'];
    if (/фитнес/i.test(t))    { niche = 'фитнес-клуба'; statuses = ['Пробное занятие','Первичная консультация','Оформление','Активный','Отписался']; }
    if (/барбер/i.test(t))    { niche = 'барбершопа';   statuses = ['Заявка','Подтверждение','Пришёл','Услуга оказана','Пропустил']; }
    if (/фотостуди/i.test(t)) { niche = 'фотостудии';   statuses = ['Заявка','Подбор даты','Бронь','Съёмка','Постпродакшен','Закрыто']; }
    if (/стоматолог/i.test(t)){ niche = 'стоматологии'; statuses = ['Первичная','Диагностика','План лечения','Лечение','На поддержке']; }
    if (/курс/i.test(t))      { niche = 'онлайн-курсов'; statuses = ['Лид','Согласовано','Оплата','Прошёл модуль 1','Завершил','Отвалился']; }
    return [
      { id:nid(), role:'assistant', content:`Понял, готовлю воронку под ${niche}. Сначала посмотрю что уже есть.`,
        tools:[{ name:'crm.list_pipelines', result:'3 существующие: Продажи, Сервис, Партнёры', ok:true }]
      },
      { id:nid(), role:'assistant', content:`Предлагаю создать воронку с ${statuses.length} статусами:\n${statuses.map(s=>'• '+s).join('\n')}\n\nПоказать diff?` },
      { id:nid(), role:'assistant', content:'Готов diff:', actions:[
        { id:aid(), tool:'crm.plan_create_pipeline', title:`Создать воронку для ${niche}`,
          diff:{ before:null, after:{ name:'Заказы', statuses: statuses.map((s,i) => ({ name:s, color:['#94A3B8','#7C3AED','#0EA5E9','#F59E0B','#10B981','#22C55E'][i%6] })) } } }
      ]}
    ];
  }

  // "задач", "напоминани" → создать задачу
  if (/задач|напоминани|уведомлени/i.test(t)) {
    return [
      { id:nid(), role:'assistant', content:'Настрою напоминание менеджеру. Триггер сработает автоматически.', actions:[
        { id:aid(), tool:'automation.plan_create_trigger', title:'Задача при статусе "Бронь"',
          diff:{ before:null, after:{ event:'lead.status_changed', condition:{ statusName:'Бронь' }, action:{ type:'create_task', title:'Позвонить клиенту за 24ч', assignee:'responsible', dueOffset:'-P1D' } } } }
      ]}
    ];
  }

  // "статистик" / "покажи" — read-only
  if (/статист|покаж|отчёт/i.test(t)) {
    return [
      { id:nid(), role:'assistant', content:'За последние 30 дней:\n• Новых сделок: 46\n• Выигранных: 12 (26%)\n• Закрытых с отказом: 8\n• В работе: 26\n• Средний чек: 8 400 ₽\n• Средний цикл сделки: 6.2 дня',
        tools:[
          { name:'crm.list_leads', args:'period=30d', result:'46 сделок', ok:true },
          { name:'crm.aggregate', args:'group_by=status', result:'12 won / 8 lost / 26 in progress', ok:true },
        ]}
    ];
  }

  // "тег"
  if (/тег/i.test(t)) {
    const m = t.match(/["«"']([^"»"']+)["»"']/);
    const tag = m ? m[1] : 'VIP';
    return [
      { id:nid(), role:'assistant', content:`Добавлю тег «${tag}». В amoCRM теги задаются на уровне контактов и сделок.`, actions:[
        { id:aid(), tool:'crm.plan_create_tag', title:`Создать тег "${tag}"`, diff:{ before:null, after:{ name:tag, color:'#7C3AED', entity:'contact' } } }
      ]}
    ];
  }

  // Fallback — general answer
  return [
    { id:nid(), role:'assistant', content:'Понял запрос. В боевой версии я тут вызову свои инструменты (посмотреть структуру CRM, предложить план, показать diff). В этом демо я работаю в scripted-режиме — попробуй одну из подсказок под полем ввода или запросы вроде:\n\n• "Добавь статус «Согласование» в воронку"\n• "Создай поле «Размер обуви» в контактах"\n• "Настрой воронку под фитнес-клуб"\n• "Покажи статистику за месяц"' }
  ];
}

  if (!state.builder.mode)          state.builder.mode = defaults.mode;
  if (!state.builder.activeSection) state.builder.activeSection = defaults.activeSection;
  if (!state.builder.config)        state.builder.config = defaults.config;

  const mode = state.builder.mode;
  const isLanding = mode === 'landing';
  const c = isLanding ? state.builder.config : state.builder.catalog;
  const active = state.builder.activeSection;

  const sections = isLanding
    ? [
        { id:'brand',        label:'Бренд',    icon:'sparkles' },
        { id:'hero',         label:'Hero',     icon:'layout' },
        { id:'services',     label:'Услуги',   icon:'layers' },

        { id:'visibility',   label:'Секции',   icon:'eye' },

        { id:'categories', label:'Категории', icon:'layers' },
        { id:'products',   label:'Товары',    icon:'store' },

  return `<div class="flex h-[calc(100vh-4rem)]">
    <div class="w-96 border-r border-ink-800 bg-ink-950/40 flex flex-col">
      <div class="p-4 border-b border-ink-800">

// ─── Live preview: catalog mini-app (phone-shaped) ─────────────────────────
function renderCatalogPreview() {
  if (!state.builder.catalog) state.builder.catalog = defaultState().builder.catalog;
  const c = state.builder.catalog;
  const brand = c.brand.primaryColor;
  const activeCat = c.categories.find(x => x.active) || c.categories[0];
  const products = activeCat && activeCat.id !== 'c1'
    ? c.products.filter(p => p.category === activeCat.id)
    : c.products;
  const cartCount = c.cart.reduce((n,i)=>n+i.qty,0);
  const cartTotal = c.cart.reduce((sum, item) => {
    const p = c.products.find(x => x.id === item.productId);
    return sum + (p ? p.price * item.qty : 0);
  }, 0);

  return `<div class="max-w-sm mx-auto">
    <div class="rounded-[36px] bg-black p-2 shadow-2xl mx-auto" style="width:380px">
      <div class="rounded-[28px] bg-white overflow-hidden" style="height:720px">
        <div class="h-8 flex items-center justify-center text-[10px] font-semibold" style="color:#0F172A">9:41</div>
        <div class="px-4 py-3 flex items-center justify-between border-b" style="border-color:#F1F5F9">
          <div class="flex items-center gap-2">
            ${c.brand.logo
              ? `<img src="${c.brand.logo}" class="h-8 w-8 rounded-lg object-cover" alt="">`
              : `<div class="h-8 w-8 rounded-lg" style="background:${brand}"></div>`}
            <div class="font-bold text-sm" style="color:#0F172A">${esc(c.brand.name)}</div>
          </div>
          <button class="relative p-2 rounded-lg" style="color:${brand}">
            ${I.store(20)}
            ${cartCount?`<div class="absolute -top-1 -right-1 h-4 w-4 rounded-full text-white text-[9px] font-bold flex items-center justify-center" style="background:${brand}">${cartCount}</div>`:''}
          </button>
        </div>
        <div class="px-4 py-3 flex gap-2 overflow-x-auto scrollbar-hide border-b" style="border-color:#F1F5F9">
          ${c.categories.map(cat => `<button data-action="catalogSetCategory" data-arg="${cat.id}" class="whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium transition ${cat.active?'text-white':'text-slate-600'}" style="background:${cat.active?brand:'#F1F5F9'}">${esc(cat.name)}</button>`).join('')}
        </div>
        <div class="p-4 grid grid-cols-2 gap-3 overflow-auto" style="height:calc(720px - 32px - 60px - 55px - 60px)">
          ${products.map(p => {
            const inCart = c.cart.find(x => x.productId === p.id);
            return `<div class="rounded-xl border overflow-hidden flex flex-col" style="border-color:#F1F5F9">
              <div class="aspect-square" style="background:${p.image?'transparent':'#F8FAFC'}">
                ${p.image
                  ? `<img src="${p.image}" class="w-full h-full object-cover" alt="">`
                  : `<div class="w-full h-full flex items-center justify-center" style="color:${brand}80">${I.sparkles(28)}</div>`}
              </div>
              <div class="p-2.5 flex-1 flex flex-col justify-between">
                <div class="text-[11px] font-semibold leading-tight mb-1" style="color:#0F172A">${esc(p.name)}</div>
                <div class="flex items-center justify-between">
                  <div class="text-xs font-bold" style="color:${brand}">${fmt(p.price)} ₽</div>
                  <button data-action="catalogAddToCart" data-arg="${p.id}" class="h-6 w-6 rounded-full text-white text-xs font-bold" style="background:${brand}">${inCart?inCart.qty:'+'}</button>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
        ${c.cart.length?`<div class="p-3 border-t" style="border-color:#F1F5F9">
          <button data-action="catalogCheckout" class="w-full flex items-center justify-between text-white px-4 py-2.5 rounded-xl text-sm font-semibold" style="background:${brand}">
            <span>Оформить заказ</span>
            <span>${fmt(cartTotal)} ₽</span>
          </button>
        </div>`:`<div class="p-3 border-t text-center text-xs" style="border-color:#F1F5F9;color:#94A3B8">Корзина пуста</div>`}
      </div>
    </div>
    <div class="text-center mt-4 text-xs text-ink-500">Заказ уйдёт в amoCRM → сделка с составом товаров</div>
  </div>`;
}

//  MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════
const screens = {
  dashboard:    renderDashboard,
  chat:         renderChat,
  integrations: renderIntegrations,
  templates:    renderTemplates,
  builder:      renderBuilder,
  deployments:  renderDeployments,
  marketplace:  renderMarketplace,
  billing:      renderBilling,
  audit:        renderAudit,
  settings:     renderSettings,
};

function render() {
  const app = document.getElementById('app');
  let content;
  if (state.view === 'landing') {
    content = renderLanding();
  } else {
    const screen = screens[state.view] || renderDashboard;
    content = `<div class="flex h-screen">${Sidebar()}<main class="flex-1 flex flex-col overflow-hidden">${TopBar()}<div class="flex-1 overflow-auto">${screen()}</div></main></div>`;
  }
  // Overlay modals rendered on top
  const overlays = (state.botSim && state.botSim.open) ? renderBotSimModal() : '';
  app.innerHTML = content + overlays;
  // Post-render: scroll chat + bot sim to bottom
  const chatScroll = document.getElementById('chat-scroll');
  if (chatScroll) chatScroll.scrollTop = chatScroll.scrollHeight;
  const botScroll = document.getElementById('botsim-scroll');
  if (botScroll) botScroll.scrollTop = botScroll.scrollHeight;
  // Autofocus prompt in bot sim
  const botInput = document.getElementById('botsim-input');
  if (botInput && !botInput.disabled) botInput.focus();
  saveState();
}

// ═══════════════════════════════════════════════════════════════════════════
//  ACTIONS  (dispatched via data-action attributes)
// ═══════════════════════════════════════════════════════════════════════════
const actions = {
  go: (view) => { state.view = view; render(); },

  // Landing / modals
  openIntegrationsModal:  () => { state.integrations.modalOpen = true;  render(); },
  closeIntegrationsModal: () => { state.integrations.modalOpen = false; render(); },
  closeAllModals: () => {
    state.integrations.modalOpen = false;
    state.marketplace.installing = null;
    render();
  },

  // Chat mutations
  applyMutation:  (id) => {
    state.chat.applied[id] = 'applied';
    state.audit.log.unshift({ id:'a'+Date.now(), who:'Григорий', action:'apply', target:`Мутация ${id} применена в CRM`, when:'только что', kind:'mutation' });
    render();
  },
  rejectMutation: (id) => { state.chat.applied[id] = 'rejected'; render(); },

  // Chat input
  setChatInputAndFocus: (text) => {
    const ta = document.getElementById('chat-input');
    if (ta) { ta.value = text; ta.focus(); }
  },
  sendChatMessage: () => {
    const ta = document.getElementById('chat-input');
    if (!ta) return;
    const text = ta.value.trim();
    if (!text) return;
    const userMsg = { id: 'm'+(++state.chat.nextId), role:'user', content: text };
    state.chat.messages.push(userMsg);
    state.chat.typing = true;
    ta.value = '';
    render();
    setTimeout(() => {
      state.chat.typing = false;
      const responses = scriptedAIResponse(text);
      state.chat.messages.push(...responses);
      render();
    }, 900);
  },

  newChatSession: () => {
    state.chat.messages = [];
    state.chat.applied = {};
    state.chat.messages.push({
      id:'m'+(++state.chat.nextId), role:'assistant',
      content:'Готов помочь. Что настроим? Могу изменить структуру CRM, собрать шаблон сайта или бота, подключить интеграцию. Опиши задачу — покажу план и diff перед применением.'
    });
    state.view = 'chat';
    render();
  },

  // Integrations
  addIntegration: (providerId) => {
    const p = providerById(providerId);
    if (!p) return;
    state.integrations.list.push({
      id: 'i'+Date.now(), provider: providerId,
      name: `${p.name} (только что)`, subdomain: 'demo.example.com',
      status: 'connected', lastSync: 'только что', pipelines: 0, fields: 0,
    });
    state.integrations.modalOpen = false;
    state.audit.log.unshift({ id:'a'+Date.now(), who:'Григорий', action:'oauth', target:`Подключён ${p.name}`, when:'только что', kind:'auth' });
    render();
  },
  refreshIntegration: (id) => {
    const it = state.integrations.list.find(x => x.id === id);
    if (it) { it.status = 'connected'; it.lastSync = 'только что'; }
    render();
  },

  // Templates
  setTemplateFilter: (id) => { state.templates.filter = id; render(); },

  // Builder — mode + section navigation
  builderSetMode: (m) => { state.builder.mode = m; state.builder.activeSection = 'brand'; render(); },
  builderSetSection: (id) => { state.builder.activeSection = id; render(); },

  // Builder — brand
  builderSetColor: (color) => {
    if (state.builder.mode === 'landing') state.builder.config.brand.primaryColor = color;
    else state.builder.catalog.brand.primaryColor = color;
    render();
  },

  // Builder — AI presets (extended)
  builderPreset: (text) => {
    state.builder.busy = true;
    render();
    setTimeout(() => {
      const isLanding = state.builder.mode === 'landing';
      const c = isLanding ? state.builder.config : state.builder.catalog;
      const t = text.toLowerCase();
      if (t.includes('изумруд') || t.includes('зелён')) c.brand.primaryColor = '#10B981';
      if (t.includes('син'))                            c.brand.primaryColor = '#0EA5E9';
      if (isLanding && t.includes('питере'))            c.hero.title = 'Фотостудия в Питере';
      if (isLanding && t.includes('предмет'))
        c.services = [...c.services, { id:'s'+Date.now(), name:'Предметная съёмка', price:'от 7 000 ₽', icon:null, desc:'Съёмка товаров' }];
      if (isLanding && t.includes('деловые'))
        c.testimonials = [
          { id:'r'+Date.now(),   author:'Николай С.', role:'Founder, ProDesign', avatar:null, text:'Команда отработала как швейцарские часы. Съёмка для каталога — точно, в срок, без правок.' },
          { id:'r'+Date.now()+1, author:'Мария В.',  role:'Marketing, RetailX',  avatar:null, text:'Сотрудничаем уже год. Стабильно высокое качество, чёткие сроки, разумные бюджеты.' },
        ];
      if (isLanding && t.includes('скрой') && t.includes('faq')) c.sections.faq = false;
      if (isLanding && t.includes('покажи') && t.includes('faq')) c.sections.faq = true;
      if (!isLanding && (t.includes('bright') || t.includes('bright lights')))
        c.brand.name = 'Bright Lights';
      if (!isLanding && t.includes('декор'))
        c.categories.push({ id:'c'+Date.now(), name:'Декор', active:false });
      state.builder.busy = false;
      render();
    }, 700);
  },

  // Builder — services CRUD
  addService: () => {
    const idx = state.builder.config.services.length + 1;
    state.builder.config.services.push({ id:'s'+Date.now(), name:`Услуга ${idx}`, price:'от 5 000 ₽', icon:null, desc:'Описание услуги' });
    render();
  },
  removeService: (id) => { state.builder.config.services = state.builder.config.services.filter(s => s.id !== id); render(); },

  // Builder — testimonials CRUD
  addTestimonial: () => {
    state.builder.config.testimonials.push({ id:'r'+Date.now(), author:'Клиент', role:'Отзыв', avatar:null, text:'Всё отлично.' });
    render();
  },
  removeTestimonial: (id) => { state.builder.config.testimonials = state.builder.config.testimonials.filter(r => r.id !== id); render(); },

  // Builder — FAQ CRUD
  addFaq: () => { state.builder.config.faq.push({ id:'f'+Date.now(), q:'Вопрос', a:'Ответ' }); render(); },
  removeFaq: (id) => { state.builder.config.faq = state.builder.config.faq.filter(f => f.id !== id); render(); },

  // Builder — catalog categories/products
  addCategory: () => { state.builder.catalog.categories.push({ id:'c'+Date.now(), name:'Новая категория', active:false }); render(); },
  removeCategory: (id) => { state.builder.catalog.categories = state.builder.catalog.categories.filter(c => c.id !== id); render(); },
  addProduct: () => { state.builder.catalog.products.push({ id:'p'+Date.now(), name:'Новый товар', price:0, image:null, category:'c1' }); render(); },
  removeProduct: (id) => { state.builder.catalog.products = state.builder.catalog.products.filter(p => p.id !== id); render(); },

  // Builder — image clear
  clearImage: (path) => { setPath(state, path, null); render(); },

  // Catalog preview interactions
  catalogSetCategory: (id) => {
    state.builder.catalog.categories.forEach(c => c.active = c.id === id);
    render();
  },
  catalogAddToCart: (productId) => {
    const cart = state.builder.catalog.cart;
    const existing = cart.find(x => x.productId === productId);
    if (existing) existing.qty++;
    else cart.push({ productId, qty:1 });
    render();
  },
  catalogCheckout: () => {
    const total = state.builder.catalog.cart.reduce((sum, item) => {
      const p = state.builder.catalog.products.find(x => x.id === item.productId);
      return sum + (p ? p.price * item.qty : 0);
    }, 0);
    alert(`Заказ на ${fmt(total)} ₽ отправлен в amoCRM как новая сделка. В боевой версии — реально попадёт в CRM клиента.`);
    state.audit.log.unshift({ id:'a'+Date.now(), who:'система', action:'create_lead', target:`Заказ из каталога: ${fmt(total)} ₽`, when:'только что', kind:'recipe' });
    state.builder.catalog.cart = [];
    render();
  },

  exportConfig: () => {
    const cfg = state.builder.mode === 'landing' ? state.builder.config : state.builder.catalog;
    const blob = new Blob([JSON.stringify(cfg, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `konvey-${state.builder.mode}-config.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  },

  // Bot simulator
  openBotSim: () => {
    state.botSim = {
      open: true,
      messages: [],
      currentNode: 'welcome',
      scratch: {},
    };
    botSimEnterNode('welcome');
    render();
  },
  closeBotSim: () => { state.botSim = null; render(); },
  botSimClick: (goto) => { botSimEnterNode(goto); render(); },
  botSimSend: () => {
    const el = document.getElementById('botsim-input');
    if (!el) return;
    const text = el.value.trim();
    if (!text) return;
    const node = BOT_FLOW.nodes[state.botSim.currentNode];
    if (node && node.kind === 'prompt') {
      state.botSim.messages.push({ role:'user', text });
      state.botSim.scratch[node.save_to] = text;
      el.value = '';
      render();
      setTimeout(() => { botSimEnterNode(node.next); render(); }, 400);
    }
  },

  // Marketplace
  openRecipeInstall: (id) => { state.marketplace.installing = recipes.find(r => r.id === id); state.marketplace.step = 1; render(); },
  closeRecipeInstall: () => { state.marketplace.installing = null; render(); },
  nextRecipeStep: () => { state.marketplace.step++; render(); },
  prevRecipeStep: () => { state.marketplace.step--; render(); },
  finishRecipeInstall: () => {
    const inst = state.marketplace.installing;
    if (inst && !state.marketplace.installed.includes(inst.id)) {
      state.marketplace.installed.push(inst.id);
      state.audit.log.unshift({ id:'a'+Date.now(), who:'Григорий', action:'install_recipe', target:`Установлен «${inst.name}»`, when:'только что', kind:'recipe' });
    }
    state.marketplace.installing = null;
    render();
  },

  // Audit
  setAuditTab: (id) => { state.audit.tab = id; render(); },

  // Meta
  resetDemo: () => {
    if (confirm('Сбросить все данные демо? Все применённые мутации, установленные рецепты и настройки будут стёрты.')) {
      resetState();
    }
  },
};

// ═══════════════════════════════════════════════════════════════════════════
//  EVENT DELEGATION
// ═══════════════════════════════════════════════════════════════════════════
document.body.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const arg = target.dataset.arg;
  if (actions[action]) {
    e.preventDefault();
    actions[action](arg, e);
  }
});

// Form submit for chat
document.body.addEventListener('submit', (e) => {
  const form = e.target.closest('[data-action="sendChatMessageForm"]');
  if (form) { e.preventDefault(); actions.sendChatMessage(); }
});

// Enter-to-send on chat textarea + bot simulator
document.body.addEventListener('keydown', (e) => {
  if (!e.target) return;
  if (e.target.id === 'chat-input' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    actions.sendChatMessage();
  } else if (e.target.id === 'botsim-input' && e.key === 'Enter') {
    e.preventDefault();
    actions.botSimSend();
  }
});

// Input bindings — update state WITHOUT full re-render (preserves focus/caret)
document.body.addEventListener('input', (e) => {
  // File upload
  const fileEl = e.target.closest('input[type="file"][data-upload]');
  if (fileEl && fileEl.files && fileEl.files[0]) {
    handleImageUpload(fileEl.files[0], fileEl.dataset.upload, fileEl.dataset.variant || 'square');
    return;
  }
  // Checkbox toggle
  const toggleEl = e.target.closest('input[type="checkbox"][data-toggle]');
  if (toggleEl) {
    setPath(state, toggleEl.dataset.toggle, toggleEl.checked);
    saveState();
    refreshPreview();
    return;
  }
  // Text bindings
  const el = e.target.closest('[data-bind]');
  if (!el) return;
  const path = el.dataset.bind;
  const value = el.type === 'number' ? Number(el.value) : el.value;
  setPath(state, path, value);
  saveState();
  refreshPreview();
});

function refreshPreview() {
  const preview = document.getElementById('preview-panel');
  if (!preview) return;
  preview.innerHTML = state.builder.mode === 'landing' ? renderLandingPreview() : renderCatalogPreview();
}

async function handleImageUpload(file, path, variant) {
  const preset = IMG_PRESETS[variant] || IMG_PRESETS.square;
  try {
    const dataUrl = await compressImage(file, { maxDim: preset.maxDim, quality: preset.quality });
    setPath(state, path, dataUrl);
    saveState();
    render();
  } catch (err) {
    alert('Ошибка загрузки: ' + err.message);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  BOT SIMULATOR — Telegram-like phone mockup with real flow interpreter
// ═══════════════════════════════════════════════════════════════════════════
const BOT_FLOW = {
  entry: 'welcome',
  nodes: {
    welcome: {
      kind: 'message',
      text: (s) => `Здравствуйте! Вас приветствует ${state.builder.config.brand.name}. Чем можем помочь?`,
      buttons: [
        { text:'Оставить заявку',  goto:'ask_name' },
        { text:'Услуги и цены',    goto:'services' },
        { text:'Контакты',         goto:'contacts' },
      ],
    },
    services: {
      kind: 'message',
      text: () => 'Наши услуги:\n' + state.builder.config.services.map(s => `• ${s.name} — ${s.price}`).join('\n'),
      buttons: [{ text:'← Назад', goto:'welcome' }],
    },
    contacts: {
      kind: 'message',
      text: () => `${state.builder.config.contacts.address}\n☎ ${state.builder.config.contacts.phone}\n✉ ${state.builder.config.contacts.email}`,
      buttons: [{ text:'← Назад', goto:'welcome' }],
    },
    ask_name: { kind: 'prompt', save_to:'name',  text:'Как вас зовут?',    next:'ask_phone' },
    ask_phone:{ kind: 'prompt', save_to:'phone', text:'Ваш телефон?',      next:'ask_service' },
    ask_service: {
      kind: 'message',
      text: () => 'Какая услуга вас интересует?',
      buttons: () => state.builder.config.services.map(s => ({ text:s.name, goto:'create_lead', pick:s.name })),
    },
    create_lead: {
      kind: 'action',
      run: (session) => {
        const audit = {
          id:'a'+Date.now(), who:'bot',
          action:'create_lead',
          target:`Заявка из TG-бота: ${session.name || '—'} · ${session.phone || '—'} · ${session.service || '—'}`,
          when:'только что', kind:'recipe',
        };
        state.audit.log.unshift(audit);
        saveState();
      },
      next: 'done',
    },
    done: {
      kind: 'message',
      text: (s) => `Спасибо, ${s.name || 'друг'}! Ваша заявка отправлена. Мы свяжемся с вами в течение 30 минут.\n\n(Сделка появилась в amoCRM — открой Журнал, чтобы увидеть)`,
      buttons: [{ text:'Начать заново', goto:'welcome' }],
    },
  },
};

function botSimEnterNode(id) {
  const node = BOT_FLOW.nodes[id];
  if (!node) return;
  state.botSim.currentNode = id;

  if (node.kind === 'action') {
    node.run(state.botSim.scratch);
    setTimeout(() => { botSimEnterNode(node.next); render(); }, 300);
    return;
  }
  const text = typeof node.text === 'function' ? node.text(state.botSim.scratch) : node.text;
  const buttons = typeof node.buttons === 'function' ? node.buttons(state.botSim.scratch) : (node.buttons || []);
  state.botSim.messages.push({ role:'bot', text, buttons });
  if (node.kind === 'prompt') {
    // Wait for user input via textbox
  }
}

// Register clicks on picker-buttons (with pick payload)
actions.botSimPick = (goto, e) => {
  const btn = e.target.closest('[data-arg]');
  const pick = btn ? btn.dataset.pick : null;
  if (pick) {
    state.botSim.messages.push({ role:'user', text: pick });
    state.botSim.scratch.service = pick;
  } else {
    const label = btn ? btn.textContent.trim() : '';
    state.botSim.messages.push({ role:'user', text: label });
  }
  setTimeout(() => { botSimEnterNode(goto); render(); }, 300);
  render();
};

function renderBotSimModal() {
  if (!state.botSim || !state.botSim.open) return '';
  const brand = state.builder.config.brand.primaryColor;
  const currentNode = BOT_FLOW.nodes[state.botSim.currentNode];
  const isPrompt = currentNode && currentNode.kind === 'prompt';

  return `<div class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
    <div class="absolute inset-0 bg-ink-950/85 backdrop-blur-sm" data-action="closeBotSim"></div>
    <div class="relative bg-ink-900 border border-ink-700 rounded-3xl shadow-2xl overflow-hidden animate-slide-up flex" style="width:420px">
      <div class="flex-1 rounded-[36px] bg-black p-2 m-1" style="width:400px">
        <div class="rounded-[28px] bg-[#17212B] overflow-hidden flex flex-col" style="height:720px">
          <!-- Status bar -->
          <div class="h-8 flex items-center justify-between px-6 text-[10px] font-semibold text-white/80">
            <span>9:41</span>
            <span>●●● 100%</span>
          </div>
          <!-- Bot header (TG style) -->
          <div class="px-4 py-2 flex items-center gap-3 bg-[#242F3D]">
            <button data-action="closeBotSim" class="text-white/70">${I.chevR(20).replace('<svg','<svg style="transform:rotate(180deg)"')}</button>
            <div class="h-9 w-9 rounded-full flex items-center justify-center text-white font-bold" style="background:${brand}">${esc(state.builder.config.brand.name[0])}</div>
            <div class="flex-1">
              <div class="font-semibold text-white text-sm">${esc(state.builder.config.brand.name)} bot</div>
              <div class="text-[11px] text-emerald-400">онлайн</div>
            </div>
          </div>
          <!-- Messages -->
          <div id="botsim-scroll" class="flex-1 overflow-auto p-3 space-y-2" style="background:#0E1621;background-image:radial-gradient(rgba(255,255,255,.02) 1px, transparent 1px);background-size:20px 20px">
            ${state.botSim.messages.map((m, i) => {
              if (m.role === 'bot') return `
                <div class="flex flex-col items-start gap-1 animate-slide-up">
                  <div class="max-w-[80%] px-3 py-2 rounded-2xl rounded-tl-md bg-[#182533] text-white text-sm whitespace-pre-line">${esc(m.text)}</div>
                  ${m.buttons && m.buttons.length && i === state.botSim.messages.length - 1 ? `<div class="flex flex-wrap gap-1.5 mt-1">
                    ${m.buttons.map(b => `<button data-action="${b.pick?'botSimPick':'botSimClick'}" data-arg="${esc(b.goto)}" ${b.pick?`data-pick="${esc(b.pick)}"`:''} class="px-3 py-1.5 rounded-full text-xs font-medium border border-white/10 bg-white/5 hover:bg-white/10 text-white/90">${esc(b.text)}</button>`).join('')}
                  </div>` : ''}
                </div>`;
              return `<div class="flex justify-end animate-slide-up">
                <div class="max-w-[80%] px-3 py-2 rounded-2xl rounded-tr-md text-white text-sm" style="background:${brand}">${esc(m.text)}</div>
              </div>`;
            }).join('')}
          </div>
          <!-- Input area -->
          <div class="p-2 border-t border-white/5 bg-[#17212B] flex gap-2 items-center">
            <input id="botsim-input" placeholder="${isPrompt ? 'Ответьте здесь...' : 'Выберите вариант выше'}" ${isPrompt?'':'disabled'} class="flex-1 bg-[#242F3D] rounded-full px-4 py-2 text-sm text-white outline-none focus:ring-1 focus:ring-white/20 disabled:opacity-50 placeholder:text-white/40">
            <button data-action="botSimSend" ${isPrompt?'':'disabled'} class="h-9 w-9 rounded-full flex items-center justify-center text-white disabled:opacity-30" style="background:${brand}">${I.send(14)}</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════
loadState();
render();
</script>
